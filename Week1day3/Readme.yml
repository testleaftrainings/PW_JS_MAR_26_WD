Conditional statements:
-----------------------

A switch statement evaluates an expression and executes the matching case block.

syntax:
-------

switch(expression) {
  case value1:
    // code
    break;

  case value2:
    // code
    break;

  default:
    // code if no match
}

The switch statement evaluates the expression once, compares it with each case using strict 
comparison (===), executes the matching case block, uses break to stop further execution, and 
if no match is found, the default block runs.

Looping statements
------------------

Looping statements are used to execute a block of code repeatedly based on a condition.

1) For Loop : used when we know the iterations in advance

syntax:
-------

for (initialization; condition; increment/decrement) { 
//code to execute 
}  

    
2) while Loop : A while loop is used when the number of iterations is unknown, and execution 
continues as long as the given condition is true

syntax:
-------

while (condition) {
  // code to execute
}

Ex: 

while(hasNextPage){
await page.locator(`.navgbutton`).click()
hasNextPage = await page.locator(`.navgbutton`).isEnabled() // Here verification 
} 

