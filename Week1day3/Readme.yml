slice () and substring ()

| Feature        | `slice()`              | `substring()`   |
| -------------- | ---------------------- | --------------- |
| Negative index | Supports               | Not supported   |
| start > end    | Returns empty string   | Swaps values    |
| Usage          | String & Array         | Only String     |




