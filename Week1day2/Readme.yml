Variable declaration with Var, Let and const
--------------------------------------------

Variable declaration means creating a variable to store data in memory.

// Declaration : creating variable
var name

// Initialization :assigning value
name = "Sindhu"


// Declaration + Initialization
var age = 25

console.log(name); // Sindhu
console.log(age);  // 25


1) Variable declaration with var Keyword

var-> can be redeclared and reassigned

2) Variable declaration with let Keyword

let-> cannot be redeclared but can be reassigned

3) Variable declaration with const Keyword

const-> cannot be redeclared and cannot be reassigned


Hoisting
--------

Hoisting is the default behavior of JavaScript where declarations are moved to the 
top of their scope during the memory creation phase before execution.

var -> Hoisted and initialized with undefined
let-> Hoisted but not initialized → accessing before declaration gives ReferenceError (TDZ)
const-> Hoisted but not initialized → accessing before declaration gives ReferenceError (TDZ)

TDZ(Temporal dead zone)-> The time period between hoisting and initialization of a variable, where
it cannot be accessed.

Scoping
-------

visibility or accessibility of the variable in the code.

Types of scope:
--------------

Global scope → accessible everywhere
Function scope → accessible only inside a function
Block scope → accessible only inside the block { }

Operators
---------

Operators are special symbols used to perform operations on values (operands).

1) Arithmetic Operators : Used for mathematical calculations

+, -,*, /,%

/ -> Quotient
% -> Reminder

2) Assignment Operators : used to assign values to the variable

+=
-=
*=
/=
%=

3) Comparison Operators : Used to compare values (returns true/false)

>  -> Greater
<  -> Lesser
=== -> strict equality //compares both value and data type


== -> loose equality //it compares only the value, coerction
console.log(1=='1') //

4) Logical Operators : Used to combine conditions (returns true/false)

let a = true, b = false;

&&(AND)
||(OR)
!(NOT)

5) Unary Operators : works on single operand(single variable)

Pre-increment ->increments first and then assign
++a

Post-increment-> use first and then increment
a++

Pre-decrement -> ->decrement first and then assign
--b

Post decrement -> use first and then decrement
b--


